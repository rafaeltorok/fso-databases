services:
  test-postgres:
    image: postgres:16-alpine
    container_name: blogslist-test-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: test_blogslist
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s

  test-runner:
    depends_on:
      test-postgres:
        condition: service_healthy
    build:
      context: ./server
      dockerfile: test.Dockerfile
    image: blogslist-test-runner
    container_name: blogslist-test-runner
    networks:
      - test-network
    environment:
      TEST_POSTGRES_URI: postgres://admin:admin@test-postgres:5432/test_blogslist
      PORT: 3001
      SECRET: secret
      DATABASE_SSL: false

networks:
  test-network:
    driver: bridge
