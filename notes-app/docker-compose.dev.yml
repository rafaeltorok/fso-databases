services:
  dev-postgres:
    image: postgres:16-alpine
    container_name: notesapp-dev-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: notesapp
    volumes:
      - ./psql-data:/var/lib/postgresql/data
    networks:
      - dev-network
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s

  dev-server:
    depends_on:
      dev-postgres:
        condition: service_healthy
    build:
      context: ./server
      dockerfile: dev.Dockerfile
    image: notesapp-dev-server
    container_name: notesapp-dev-server
    networks:
      - dev-network
    volumes:
      - ./server:/usr/src/app/server
      - /usr/src/app/server/node_modules
    environment:
      DATABASE_URL: postgres://admin:admin@dev-postgres:5432/notesapp
      PORT: 3001
      SECRET: secret
      DATABASE_SSL: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s

  dev-nginx:
    depends_on:
      dev-server:
        condition: service_healthy
    image: nginx:stable-alpine
    container_name: notesapp-dev-nginx
    ports:
      - 8001:80
    networks:
      - dev-network
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s

networks:
  dev-network:
    driver: bridge
