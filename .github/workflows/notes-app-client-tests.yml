name: Notes app client component tests

on:
  push:
    branches: [ main ]

jobs:
  component-tests:
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: ./notes-app/client
    
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      
      - name: Install dependencies
        run: npm install

      - name: Run component tests
        run: npm run test
