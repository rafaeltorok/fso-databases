name: API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: ./blogs-list/server

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm ci

      - name: Run Integration tests
        run: npm run test
        env:
          TEST_POSTGRES_URI: postgresql://postgres:postgres@localhost:5432/test_db
          PORT: 3001
          SECRET: test_secret
          DATABASE_SSL: false
        
      - name: Start application
        run: npm run start:test > app.log 2>&1 &
        env:
          TEST_POSTGRES_URI: postgresql://postgres:postgres@localhost:5432/test_db
          PORT: 3001
          SECRET: test_secret
          DATABASE_SSL: false
          
      - name: Wait for application to be ready
        run: npx wait-on http://localhost:3001 -t 30000
      
      - name: Print application logs on failure
        if: failure()
        run: cat app.log
        
      - name: Stop application
        if: always()
        run: pkill -f "node ./src/index.js" || true
